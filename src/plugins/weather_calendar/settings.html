<form id="weatherCalendarSettingsForm">
    <!-- Hidden field for plugin ID (required by InkyPi framework) -->
    <input type="hidden" name="plugin_id" value="weather_calendar">

    <div class="settings-group">
        <label for="latitude">Latitude</label>
        <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="e.g., 40.7128" required>
    </div>

    <div class="settings-group">
        <label for="longitude">Longitude</label>
        <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="e.g., -74.0060" required>
    </div>

    <div class="settings-group">
        <label for="units">Temperature Units</label>
        <select id="units" name="units">
            <option value="metric">Celsius (°C)</option>
            <option value="imperial">Fahrenheit (°F)</option>
        </select>
    </div>

    <fieldset>
        <legend>Calendar Settings</legend>
        <div class="settings-group">
            <label>iCloud Calendar URLs</label>
            <div id="calendarUrlsContainer">
                <input type="text" name="calendarURLs[]" class="calendar-url-input" placeholder="Paste iCloud calendar .ics URL" pattern="https?://.+">
            </div>
            <button type="button" class="btn-secondary" onclick="addCalendarUrl()">+ Add Another Calendar</button>
        </div>
    </fieldset>

    <div class="settings-group">
        <label>
            <input type="checkbox" id="useSystemTimezone">
            Use system timezone from device config
        </label>
    </div>

    <div class="settings-group">
        <button type="submit" class="btn-primary">Save Settings</button>
        <span id="saveStatus" class="save-status"></span>
    </div>
</form>

<script>
    // Load saved settings when the form loads
    document.addEventListener('DOMContentLoaded', function() {
        loadSavedSettings();
    });

    // Load previously saved settings from device.json
    function loadSavedSettings() {
        fetch('/api/get_plugin_settings/weather_calendar')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.settings) {
                    const settings = data.settings;
                    
                    // Set basic fields
                    if (settings.latitude) document.getElementById('latitude').value = settings.latitude;
                    if (settings.longitude) document.getElementById('longitude').value = settings.longitude;
                    if (settings.units) document.getElementById('units').value = settings.units;
                    
                    // Load calendar URLs
                    if (settings['calendarURLs[]'] || settings.calendarURLs) {
                        const urls = settings['calendarURLs[]'] || settings.calendarURLs;
                        const container = document.getElementById('calendarUrlsContainer');
                        container.innerHTML = ''; // Clear default input
                        
                        const urlArray = Array.isArray(urls) ? urls : [urls];
                        urlArray.forEach((url, index) => {
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.name = 'calendarURLs[]';
                            input.className = 'calendar-url-input';
                            input.placeholder = 'Paste iCloud calendar .ics URL';
                            input.pattern = 'https?://.+';
                            input.value = url;
                            container.appendChild(input);
                        });
                    }
                }
            })
            .catch(error => console.log('No saved settings found:', error));
    }

    // Validate coordinates
    function validateCoordinates() {
        const lat = document.getElementById('latitude').value;
        const lon = document.getElementById('longitude').value;
        const statusEl = document.getElementById('saveStatus');

        if (!lat || !lon) {
            statusEl.textContent = '✗ Latitude and Longitude are required';
            statusEl.style.color = '#f44336';
            return false;
        }

        const latNum = parseFloat(lat);
        const lonNum = parseFloat(lon);

        if (isNaN(latNum) || isNaN(lonNum)) {
            statusEl.textContent = '✗ Coordinates must be valid numbers';
            statusEl.style.color = '#f44336';
            return false;
        }

        if (latNum < -90 || latNum > 90) {
            statusEl.textContent = '✗ Latitude must be between -90 and 90';
            statusEl.style.color = '#f44336';
            return false;
        }

        if (lonNum < -180 || lonNum > 180) {
            statusEl.textContent = '✗ Longitude must be between -180 and 180';
            statusEl.style.color = '#f44336';
            return false;
        }

        return true;
    }

    // Validate calendar URLs
    function validateCalendarUrls() {
        const inputs = document.querySelectorAll('input[name="calendarURLs[]"]');
        const statusEl = document.getElementById('saveStatus');
        // Accept https://, http://, or webcal://
        const urlRegex = /^(https?|webcal):\/\/.+/i;

        for (let input of inputs) {
            const url = input.value.trim();
            if (url && !urlRegex.test(url)) {
                statusEl.textContent = '✗ Calendar URLs must start with http://, https://, or webcal://';
                statusEl.style.color = '#f44336';
                return false;
            }
        }

        return true;
    }

    // Handle form submission to save settings
    document.getElementById('weatherCalendarSettingsForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const statusEl = document.getElementById('saveStatus');
        statusEl.textContent = '';

        // Validate coordinates
        if (!validateCoordinates()) {
            return;
        }

        // Validate calendar URLs
        if (!validateCalendarUrls()) {
            return;
        }

        const formData = new FormData(this);

        // Clean up empty calendar URLs
        const allUrls = formData.getAll('calendarURLs[]').filter(url => url.trim() !== '');
        formData.delete('calendarURLs[]');
        allUrls.forEach(url => {
            formData.append('calendarURLs[]', url.trim());
        });

        fetch('/save_plugin_settings', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                statusEl.textContent = '✓ Settings saved successfully';
                statusEl.style.color = '#4CAF50';
                setTimeout(() => {
                    statusEl.textContent = '';
                }, 3000);
            } else {
                statusEl.textContent = '✗ Error: ' + (data.error || 'Unknown error');
                statusEl.style.color = '#f44336';
            }
        })
        .catch(error => {
            statusEl.textContent = '✗ Error: ' + error.message;
            statusEl.style.color = '#f44336';
            console.error('Error:', error);
        });
    });

    function addCalendarUrl() {
        const container = document.getElementById('calendarUrlsContainer');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = 'calendarURLs[]';
        input.className = 'calendar-url-input';
        input.placeholder = 'Paste iCloud calendar .ics URL';
        input.pattern = 'https?://.+';
        container.appendChild(input);
    }
</script>

<style>
    fieldset {
        border: 1px solid #ddd;
        padding: 15px;
        margin: 20px 0;
        border-radius: 4px;
    }

    legend {
        font-weight: bold;
        padding: 0 10px;
    }

    .calendar-url-input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
    }

    .btn-secondary {
        padding: 8px 12px;
        background-color: #f0f0f0;
        border: 1px solid #999;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }

    .btn-secondary:hover {
        background-color: #e0e0e0;
    }

    .btn-primary {
        padding: 10px 20px;
        background-color: #2196F3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    .btn-primary:hover {
        background-color: #0b7dda;
    }

    .save-status {
        margin-left: 10px;
        font-weight: bold;
        display: inline-block;
    }
</style>
