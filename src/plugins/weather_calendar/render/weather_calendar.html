<html>
<head>
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.0;
        }

        .container {
            width: 100%;
            max-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .weather-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .forecast-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .forecast-card {
            border: 2px solid #000;
            padding: 10px;
            text-align: center;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .forecast-card .date {
            font-size: 10px;
            font-weight: 900;
            margin-bottom: 1px;
            letter-spacing: 0.2px;
        }

        .forecast-card .day-name {
            font-size: 8px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #000;
        }

        .forecast-card .weather-icon {
            font-size: 28px;
            margin-bottom: 4px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.0;
        }

        .forecast-card .condition {
            font-size: 7px;
            margin-bottom: 4px;
            min-height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1.0;
        }

        .forecast-card .temps {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.3px;
        }

        .forecast-card .temps .max {
            color: #000;
        }

        .forecast-card .temps .separator {
            margin: 0 3px;
            color: #000;
        }

        .forecast-card .temps .min {
            color: #000;
        }

        .events-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-top: 2px solid #000;
            padding-top: 8px;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            max-height: 100%;
        }

        .event-item {
            display: flex;
            padding: 6px;
            border-left: 2px solid #000;
            background-color: #fff;
            align-items: flex-start;
            gap: 6px;
        }

        .event-item .time {
            font-weight: 900;
            min-width: 40px;
            color: #000;
            font-size: 7px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }

        .event-item .title {
            flex: 1;
            word-break: break-word;
            font-size: 8px;
            line-height: 1.1;
            font-weight: 600;
            color: #000;
        }

        .no-events {
            text-align: center;
            color: #000;
            font-weight: 700;
            padding: 10px;
            font-size: 8px;
        }

        @media (max-width: 768px) {
            .forecast-cards {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 8px;
                gap: 8px;
            }

            .forecast-card {
                padding: 8px;
                border: 2px solid #000;
            }

            .forecast-card .date {
                font-size: 9px;
            }

            .forecast-card .day-name {
                font-size: 7px;
            }

            .forecast-card .weather-icon {
                font-size: 24px;
                height: 26px;
            }

            .forecast-card .condition {
                font-size: 7px;
                min-height: 13px;
            }

            .forecast-card .temps {
                font-size: 11px;
            }

            .event-item {
                padding: 6px;
                border-left: 2px solid #000;
                font-size: 7px;
            }

            .event-item .time {
                font-size: 7px;
                min-width: 35px;
            }

            .event-item .title {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Weather Forecast Section (No Title) -->
        <div class="weather-section">
            <div class="forecast-cards">
                {% for day in weather %}
                <div class="forecast-card">
                    <div class="date">{{ day.date }}</div>
                    <div class="day-name">{{ day.day_name }}</div>
                    <div class="weather-icon">{{ day.icon }}</div>
                    <div class="condition">{{ day.condition }}</div>
                    <div class="temps">
                        <span class="max">{{ day.temp_max }}°</span>
                        <span class="separator">/</span>
                        <span class="min">{{ day.temp_min }}°</span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Today's Events Section (No Title) -->
        <div class="events-section">
            {% if events %}
                <div class="events-list">
                    {% for event in events %}
                    <div class="event-item">
                        <span class="time">{{ event.start_time }}</span>
                        <span class="title">{{ event.title }}</span>
                    </div>
                    {% endfor %}
                </div>
            {% else %}
                <p class="no-events">No events scheduled</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
